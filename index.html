<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jihan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --gold: #c9a96e;
      --gold-light: #e8d5a3;
      --white: #faf7f2;
      --dark: #0e0c0a;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      overflow: hidden;
      cursor: none;
    }

    /* ── CUSTOM CURSOR ── */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: transform 0.1s ease;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(201,169,110,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      transition: transform 0.25s ease, width 0.3s ease, height 0.3s ease;
    }

    /* ── GRAIN ── */
    .grain {
      position: fixed; inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── PHOTO ── */
    .scene {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .photo-wrap {
      position: relative;
      width: 100vw; height: 100vh;
      overflow: hidden;
      animation: revealPhoto 1.8s cubic-bezier(0.77,0,0.175,1) forwards;
      clip-path: inset(100% 0 0 0);
    }

    .photo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      
    }

    /* Cinematic vignette */
    .photo-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.65) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.5) 100%);
      z-index: 2;
    }

    /* ── OVERLAY TEXT ── */
    .overlay {
      position: fixed; inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 56px;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.6s;
    }

    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold-light);
    }

    .top-right {
      text-align: right;
    }
    .top-right p {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      line-height: 2;
    }

    /* Center name */
    .center-name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    .name-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 14vw, 13rem);
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.0);
      -webkit-text-stroke: 1px rgba(255,255,255,0.18);
      letter-spacing: 0.05em;
      line-height: 0.9;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards 2s;
      white-space: nowrap;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 1s ease forwards 1.8s;
    }

    .name-solid {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 300;
      color: var(--white);
      letter-spacing: 0.12em;
      line-height: 1;
    }
    .name-solid span {
      font-style: italic;
      color: var(--gold-light);
    }
    .name-sub {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .name-sub::before {
      content: '';
      display: block;
      width: 24px; height: 1px;
      background: var(--gold);
      opacity: 0.6;
    }

    .bottom-right {
      text-align: right;
    }
    .bottom-right p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 1.5vw, 1.05rem);
      color: rgba(255,255,255,0.45);
      line-height: 1.8;
    }

    /* Decorative line center */
    .deco-line {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, rgba(201,169,110,0.3), transparent);
      animation: lineGrow 2s ease forwards 2.2s;
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      z-index: 11;
      pointer-events: none;
      width: 40px; height: 40px;
      opacity: 0;
      animation: fadeIn 1s ease forwards 2.4s;
    }
    .corner-tl { top: 32px; left: 32px; border-top: 1px solid rgba(201,169,110,0.4); border-left: 1px solid rgba(201,169,110,0.4); }
    .corner-tr { top: 32px; right: 32px; border-top: 1px solid rgba(201,169,110,0.4); border-right: 1px solid rgba(201,169,110,0.4); }
    .corner-bl { bottom: 32px; left: 32px; border-bottom: 1px solid rgba(201,169,110,0.4); border-left: 1px solid rgba(201,169,110,0.4); }
    .corner-br { bottom: 32px; right: 32px; border-bottom: 1px solid rgba(201,169,110,0.4); border-right: 1px solid rgba(201,169,110,0.4); }

    /* ── KEYFRAMES ── */
    @keyframes revealPhoto {
      to { clip-path: inset(0% 0 0 0); }
    }
    @keyframes zoomOut {
      to { transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes lineGrow {
      to { height: 80px; }
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .overlay { padding: 32px 28px; }
      .top-right, .bottom-right { display: none; }
      .name-main { font-size: clamp(4rem, 20vw, 6rem); }
    }
  </style>
</head>

  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

    <div class="top-bar">
      <div class="monogram">J · K</div>
      <div class="top-right">
        <p>Jawa Tengah</p>

      </div>
    </div>

    <div class="bottom-bar">
      <div>
        <div class="name-solid">Jihan <span>Kamila</span></div>

      </div>

  <script>
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    let mx=0, my=0, rx=0, ry=0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx+'px';
      cursor.style.top  = my+'px';
    });

    function animRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx+'px';
      ring.style.top  = ry+'px';
      requestAnimationFrame(animRing);
    }
    animRing();
  </script>
